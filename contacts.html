<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrzuIT - Kontakt</title>
    <link rel="preconnect" href="https://i.imgur.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb-2" aria-hidden="true"></div>
    <div class="scan-line" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="index.html">
        <img class="brand-logo" src="https://i.imgur.com/qiFjcQR.jpeg" alt="" />
        <span data-site-name>OrzuIT</span>
      </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-nav" aria-label="Menu">
          <span class="menu-toggle-bar"></span>
          <span class="menu-toggle-bar"></span>
          <span class="menu-toggle-bar"></span>
        </button>
        <nav class="nav" id="main-nav">
          <a data-nav href="index.html">Startseite</a>
          <a data-nav href="services.html">Leistungen</a>
          <a data-nav href="about.html">Uber uns</a>
          <a data-nav href="contacts.html">Kontakt</a>
          <a data-nav href="projects.html">Projekte</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1 class="section-title">Kontakt</h1>
      <div class="list" id="contacts-list"></div>

      <section class="order-section card">
        <h2 class="section-title" style="font-size: 1.35rem; margin-bottom: 8px;">Anfrage oder Bestellung senden</h2>
        <p class="muted" style="margin-bottom: 20px;">Füllen Sie das Formular aus – Sie erhalten die Bestätigung und wir melden uns bei Ihnen. Die Anfrage kommt in unserem Telegram an.</p>
        <form id="order-form" class="order-form">
          <label>Name <input id="order-name" name="name" type="text" placeholder="Ihr Name" /></label>
          <label>E-Mail <input id="order-email" name="email" type="email" placeholder="ihre@email.de" /></label>
          <label>Telefon <input id="order-phone" name="phone" type="tel" placeholder="+49 ..." /></label>
          <label>Nachricht / Bestellung <textarea id="order-message" name="message" rows="4" placeholder="Beschreiben Sie Ihre Anfrage oder Bestellung..." required></textarea></label>
          <div class="row-actions">
            <button class="button" type="submit">Anfrage senden</button>
            <span id="order-status" class="order-status" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">&copy; <span data-site-name>OrzuIT</span>. Alle Rechte vorbehalten.</div>
    </footer>

    <script src="content.js" defer></script>
    <script src="main.js" defer></script>
  </body>
</html>
