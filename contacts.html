<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt &amp; Anfrage – OrzuIT</title>
    <meta name="description" content="Kontakt zu OrzuIT: E-Mail, Telefon, Adresse. Senden Sie eine Anfrage oder Bestellung über unser Formular." />
    <meta name="keywords" content="Kontakt OrzuIT, Anfrage, Bestellung, E-Mail, Telefon" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kontakt – OrzuIT" />
    <meta property="og:description" content="Kontakt und Anfrageformular. Wir melden uns bei Ihnen." />
    <meta property="og:url" content="https://orzuit.de/contacts" />
    <meta property="og:image" content="https://i.imgur.com/qiFjcQR.jpeg" />
    <meta property="og:site_name" content="OrzuIT" />
    <meta property="og:locale" content="de_DE" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kontakt – OrzuIT" />
    <meta name="twitter:description" content="Kontakt und Anfrageformular von OrzuIT." />
    <meta name="twitter:image" content="https://i.imgur.com/qiFjcQR.jpeg" />
    <link rel="canonical" href="https://orzuit.de/contacts" />
    <link rel="preconnect" href="https://i.imgur.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb-2" aria-hidden="true"></div>
    <div class="scan-line" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/">
        <img class="brand-logo" src="https://i.imgur.com/qiFjcQR.jpeg" alt="" />
        <span data-site-name>OrzuIT</span>
      </a>
        <div class="menu-wrap">
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-nav" aria-label="Menu">
          <span class="menu-toggle-bar"></span>
          <span class="menu-toggle-bar"></span>
          <span class="menu-toggle-bar"></span>
        </button>
        <nav class="nav" id="main-nav">
          <a data-nav href="/">Startseite</a>
          <a data-nav href="/services">Leistungen</a>
          <a data-nav href="/about">Über uns</a>
          <a data-nav href="/contacts">Kontakt</a>
          <a data-nav href="/projects">Projekte</a>
        </nav>
      </div>
      </div>
    </header>

    <main class="container">
      <h1 class="section-title">Kontakt</h1>
      <section class="contacts-block" aria-labelledby="contacts-heading">
        <h2 id="contacts-heading" class="visually-hidden">Kontaktdaten</h2>
        <div class="list" id="contacts-list"></div>
      </section>

      <section id="order-section" class="order-section card" aria-labelledby="order-heading">
        <h2 id="order-heading" class="section-title" style="font-size: 1.35rem; margin-bottom: 8px;">Anfrage oder Bestellung senden</h2>
        <p class="muted" style="margin-bottom: 20px;">Füllen Sie das Formular aus – Sie erhalten die Bestätigung und wir melden uns bei Ihnen. Die Anfrage kommt in unserem Telegram an.</p>
        <form id="order-form" class="order-form">
          <label>Leistung / Dienst <select id="order-service" name="service" aria-label="Leistung auswählen"><option value="">— Bitte wählen —</option></select></label>
          <label>Name <input id="order-name" name="name" type="text" placeholder="Ihr Name" /></label>
          <label>E-Mail <input id="order-email" name="email" type="email" placeholder="ihre@email.de" /></label>
          <label>Telefon <input id="order-phone" name="phone" type="tel" placeholder="+49 ..." /></label>
          <label>Nachricht / Bestellung <textarea id="order-message" name="message" rows="4" placeholder="Beschreiben Sie Ihre Anfrage oder Bestellung..." required></textarea></label>
          <div class="row-actions">
            <button class="button" type="submit">Anfrage senden</button>
            <span id="order-status" class="order-status" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">&copy; <span data-site-name>OrzuIT</span>. Alle Rechte vorbehalten.</div>
    </footer>

    <script src="content.js" defer></script>
    <script src="main.js" defer></script>
    <script src="analytics.js"></script>
  </body>
</html>
