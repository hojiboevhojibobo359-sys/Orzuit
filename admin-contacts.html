<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrzuIT Admin - Kontakt</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body data-admin-page="contacts">
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="admin-brand" href="admin.html">
          <span data-site-name>OrzuIT</span>
          <small>Adminbereich</small>
        </a>
        <nav class="admin-menu">
          <a data-admin-nav href="admin.html">Dashboard</a>
          <a data-admin-nav href="admin-home.html">Startseite</a>
          <a data-admin-nav href="admin-services.html">Leistungen</a>
          <a data-admin-nav href="admin-about.html">Uber uns</a>
          <a data-admin-nav href="admin-contacts.html">Kontakt</a>
          <a data-admin-nav href="admin-projects.html">Projekte</a>
          <a data-admin-nav href="admin-telegram.html">Telegram</a>
        </nav>
        <div class="sidebar-footer">
          <a class="to-site" href="index.html">Zur Website</a>
          <button class="logout-btn" type="button" data-admin-logout>Abmelden</button>
        </div>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <h1>Kontakte bearbeiten</h1>
          <p>Kontaktdaten fur Kunden aktualisieren.</p>
        </header>

        <section class="admin-card">
          <form id="contactsForm" class="admin-form">
            <label>E-Mail <input id="contactEmail" type="text" /></label>
            <label>Telefon <input id="contactPhone" type="text" /></label>
            <label>Adresse <input id="contactAddress" type="text" /></label>
            <label>Telegram <input id="contactTelegram" type="text" /></label>
            <label>Arbeitszeiten <input id="contactHours" type="text" /></label>
            <div class="row-actions">
              <button class="button" type="submit">Speichern</button>
              <span id="status" class="status" hidden></span>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="content.js"></script>
    <script src="admin-auth.js"></script>
    <script src="admin-sections.js"></script>
  </body>
</html>
