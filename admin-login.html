<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrzuIT Admin - Login</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-login-page">
    <main class="login-wrap">
      <section class="login-card">
        <h1>OrzuIT Admin</h1>
        <p>Melden Sie sich an, um den Adminbereich zu nutzen.</p>

        <form id="adminLoginForm" class="admin-form">
          <label>Login <input id="username" type="text" required /></label>
          <label>Passwort <input id="password" type="password" required /></label>
          <button class="button" type="submit">Anmelden</button>
          <p id="loginError" class="login-error"></p>
        </form>

        <p class="muted">Verwenden Sie Ihre aktuellen Admin-Zugangsdaten.</p>
      </section>
    </main>

    <script src="admin-auth.js"></script>
    <script src="admin-login.js"></script>
  </body>
</html>
