<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrzuIT - Über uns</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="index.html">
        <img class="brand-logo" src="https://i.imgur.com/qiFjcQR.jpeg" alt="" />
        <span data-site-name>OrzuIT</span>
      </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-nav">
          Menu
        </button>
        <nav class="nav" id="main-nav">
          <a data-nav href="index.html">Startseite</a>
          <a data-nav href="services.html">Leistungen</a>
          <a data-nav href="about.html">Uber uns</a>
          <a data-nav href="contacts.html">Kontakt</a>
          <a data-nav href="projects.html">Projekte</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1 class="section-title">Uber uns</h1>
      <div class="card">
        <p id="about-text"></p>
      </div>
      <div class="card" style="margin-top: 16px">
        <h3>Unser Ziel</h3>
        <p id="about-mission"></p>
      </div>

      <section class="featured-project" style="margin-top: 28px">
        <h2 class="section-title" style="font-size: 26px">Unser Grunder</h2>
        <article class="card founder-preview">
          <div class="founder-layout">
            <div class="founder-photo-wrap">
              <img id="founder-photo" alt="Grunderfoto" loading="lazy" />
            </div>
            <div class="founder-info">
              <h3 id="founder-name"></h3>
              <p class="muted" id="founder-role"></p>
              <p id="founder-short-bio"></p>
              <a class="button secondary" href="founder.html">Mehr uber den Grunder</a>
            </div>
          </div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">&copy; <span data-site-name>OrzuIT</span>. Alle Rechte vorbehalten.</div>
    </footer>

    <script src="content.js"></script>
    <script src="main.js"></script>
  </body>
</html>
