<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>OrzuIT Admin - Leistungen</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body data-admin-page="services">
    <div class="admin-shell">
      <header class="admin-header-bar">
        <div class="admin-menu-wrap">
          <button class="admin-menu-toggle" type="button" aria-expanded="false" aria-controls="admin-nav" aria-label="Menu">
            <span class="admin-menu-toggle-bar"></span>
            <span class="admin-menu-toggle-bar"></span>
            <span class="admin-menu-toggle-bar"></span>
          </button>
        </div>
        <a class="admin-brand" href="/admin"><span data-site-name>OrzuIT</span> <small>Admin</small></a>
        <div class="admin-header-actions">
          <a class="to-site" href="/">Zur Website</a>
          <button class="logout-btn" type="button" data-admin-logout>Abmelden</button>
        </div>
      </header>

      <nav id="admin-nav" class="admin-nav-semicircle" aria-hidden="true">
        <div class="admin-nav-backdrop"></div>
        <div class="admin-nav-inner">
          <a data-admin-nav href="/admin">Dashboard</a>
          <a data-admin-nav href="/admin-home">Startseite</a>
          <a data-admin-nav href="/admin-services">Leistungen</a>
          <a data-admin-nav href="/admin-about">Über uns</a>
          <a data-admin-nav href="/admin-contacts">Kontakt</a>
          <a data-admin-nav href="/admin-projects">Projekte</a>
          <a data-admin-nav href="/admin-orders">Bestellungen</a>
          <a data-admin-nav href="/admin-analytics">Analytik</a>
          <a data-admin-nav href="/admin-telegram">Telegram</a>
        </div>
      </nav>

      <main class="admin-main">
        <header class="admin-header">
          <h1>Leistungen bearbeiten</h1>
          <p>Leistungen des Unternehmens hinzufugen und bearbeiten.</p>
        </header>

        <section class="admin-card">
          <form id="servicesForm" class="admin-form">
            <div id="servicesRows" class="list"></div>
            <div class="row-actions">
              <button id="addService" class="button secondary" type="button">Leistung hinzufugen</button>
              <button class="button" type="submit">Speichern</button>
              <span id="status" class="status" hidden></span>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="content.js"></script>
    <script src="admin-auth.js"></script>
    <script src="admin-sections.js"></script>
  </body>
</html>
