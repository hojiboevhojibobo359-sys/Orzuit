<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrzuIT Admin - Über uns</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body data-admin-page="about">
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="admin-brand" href="admin.html">
          <span data-site-name>OrzuIT</span>
          <small>Adminbereich</small>
        </a>
        <nav class="admin-menu">
          <a data-admin-nav href="admin.html">Dashboard</a>
          <a data-admin-nav href="admin-home.html">Startseite</a>
          <a data-admin-nav href="admin-services.html">Leistungen</a>
          <a data-admin-nav href="admin-about.html">Uber uns</a>
          <a data-admin-nav href="admin-contacts.html">Kontakt</a>
          <a data-admin-nav href="admin-projects.html">Projekte</a>
          <a data-admin-nav href="admin-telegram.html">Telegram</a>
        </nav>
        <div class="sidebar-footer">
          <a class="to-site" href="index.html">Zur Website</a>
          <button class="logout-btn" type="button" data-admin-logout>Abmelden</button>
        </div>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <h1>Bereich "Uber uns" bearbeiten</h1>
          <p>Unternehmensbeschreibung und Ziel aktualisieren.</p>
        </header>

        <section class="admin-card">
          <form id="aboutForm" class="admin-form">
            <label>Unternehmensbeschreibung <textarea id="aboutText"></textarea></label>
            <label>Unser Ziel <textarea id="aboutMission"></textarea></label>
            <h2>Grunder</h2>
            <label>Name des Grunders <input id="founderName" type="text" /></label>
            <label>Rolle <input id="founderRole" type="text" /></label>
            <label>Kurze Beschreibung <textarea id="founderShortBio"></textarea></label>
            <label>Ausfuhrliche Biografie <textarea id="founderFullBio"></textarea></label>
            <label>Foto-URL <input id="founderPhotoUrl" type="text" /></label>
            <label>LinkedIn-Profil <input id="founderLinkedIn" type="text" /></label>
            <label>E-Mail <input id="founderEmail" type="text" /></label>
            <div class="row-actions">
              <button class="button" type="submit">Speichern</button>
              <span id="status" class="status" hidden></span>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="content.js"></script>
    <script src="admin-auth.js"></script>
    <script src="admin-sections.js"></script>
  </body>
</html>
